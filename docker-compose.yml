services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: renato-portfolio
    restart: always
    ports:
      - "127.0.0.1:3100:3100"
    user: "1001:1001"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:uid=1001,gid=1001
      - /app/.next/cache:uid=1001,gid=1001
    environment:
      - NODE_ENV=production
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
