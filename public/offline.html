<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Renato Bezerra</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
    }
    .offline-card {
      text-align: center;
      max-width: 400px;
    }
    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #111;
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    a:hover { background: #000; }
  </style>
</head>
<body>
  <div class="offline-card">
    <span class="offline-icon">📡</span>
    <h1>Sem conexão</h1>
    <p>Parece que você está offline. As páginas visitadas anteriormente ainda estão disponíveis.</p>
    <a href="/">Tentar novamente</a>
  </div>
</body>
</html>
